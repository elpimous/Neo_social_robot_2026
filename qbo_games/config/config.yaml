# Configuration pour Neo Chifoumi
# Date: 02 Août 2025

chifumi_video_test_node:
  ros__parameters:
    # Topics
    input_image_topic: "/inverted_eye_image"
    debug_image_topic: "/chifoumi_debug"
    
    # MediaPipe Parameters
    mediapipe:
      max_num_hands: 1
      min_detection_confidence: 0.7
      min_tracking_confidence: 0.5
      static_image_mode: false
    
    # Detection Parameters
    detection:
      confidence_threshold: 0.6
      debug_display: true
      log_detections: true
    
    # Visual Parameters
    display:
      font_scale: 1.0
      font_thickness: 2
      text_color_high_conf: [0, 255, 0]    # Vert
      text_color_medium_conf: [0, 165, 255] # Orange
      text_color_low_conf: [0, 0, 255]     # Rouge

qbo_chifumi_game_node:
  ros__parameters:
    # Joueur
    player_name: "Vincent"
    
    # Service de parole
    speech_service: "/to_speak"
    
    # Topics
    camera_topic: "/inverted_eye_image"
    
    # Paramètres de jeu
    game:
      initial_coins: 10
      max_bad_steps: 2
      pause_between_rounds: [0.0, 2.0]  # min, max secondes
    
    # MediaPipe (même config que le test vidéo)
    mediapipe:
      max_num_hands: 1
      min_detection_confidence: 0.7
      min_tracking_confidence: 0.5
      static_image_mode: false